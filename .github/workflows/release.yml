name: Release Packages

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm

      - name: Build deb package
        run: make -C theme deb

      - name: Build rpm package
        run: make -C theme rpm

      - name: Build tar.gz archive
        run: make -C theme tar.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            theme/clarity-icons_*_all.deb
            theme/clarity-icons-*.noarch.rpm
            theme/clarity-icons-*.tar.gz
